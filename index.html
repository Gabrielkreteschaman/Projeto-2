<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Cadastro de Venda</title>
    </head>
    <body>

        <h1>Cadastro de Venda</h1>

        <form action="teste.php" method="post">
            <label>Nome do Cliente:</label><br>
            <input type="text" name="nomeCliente"><br><br>

            <label>Tipo de Cliente:</label><br>
            <select name="tipoCliente" required>
                <option value="">Selecione</option>
                <option value="fisica">Pessoa Física</option>
                <option value="juridica">Pessoa Jurídica</option>
            </select>
            <br><br>

            <label>CPF:</label><br>
            <input type="text" name="cpf">
            <br><br>

            <label>CNPJ:</label><br>
            <input type="text" name="cnpj">
            <br><br>

            <label>Nome do Produto:</label><br>
            <input type="text" name="nomeProduto"><br><br>

            <label>Marca:</label><br>
            <input type="text" name="marca"><br><br>

            <label>Preço:</label><br>
            <input type="number" step="0.01" name="preco"><br><br>

            <label>Categoria:</label><br>
            <input type="text" name="categoria"><br><br>

            <button type="submit">REALIZAR VENDA</button>
        </form>

    </body>
</html>
